<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Alinhamento e Espaçamento | Dev-Studies</title>
    <link rel="stylesheet" href="alinhamento-e-espacamento.css" />
  </head>

  <body>
    <header>
      <h1>Alinhamento e Espaçamento no CSS</h1>
      <p>Visualização prática de Flexbox e Grid</p>
    </header>

    <section>
      <h2>justify-content</h2>

      <div class="demo justify-start">
        <div>1</div>
        <div>2</div>
        <div>3</div>
      </div>

      <div class="demo justify-center">
        <div>1</div>
        <div>2</div>
        <div>3</div>
      </div>

      <div class="demo justify-between">
        <div>1</div>
        <div>2</div>
        <div>3</div>
      </div>
    </section>

    <section>
      <h2>align-items</h2>

      <div class="demo align-start altura">
        <div>1</div>
        <div>2</div>
        <div>3</div>
      </div>

      <div class="demo align-center altura">
        <div>1</div>
        <div>2</div>
        <div>3</div>
      </div>

      <div class="demo align-end altura">
        <div>1</div>
        <div>2</div>
        <div>3</div>
      </div>
    </section>

    <section>
      <h2>gap</h2>

      <div class="grid gap-demo">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
      </div>
    </section>

    <section>
      <h2>justify-items (GRID)</h2>

      <div class="grid justify-items">
        <div>1</div>
        <div>2</div>
        <div>3</div>
      </div>
    </section>

    <section>
      <h2>align-items (GRID)</h2>

      <div class="grid align-items altura">
        <div>1</div>
        <div>2</div>
        <div>3</div>
      </div>
    </section>

    <section>
      <h2>justify-self</h2>

      <div class="grid">
        <div>1</div>
        <div class="self-center">2</div>
        <div>3</div>
      </div>
    </section>

    <section>
      <h2>align-self</h2>

      <div class="grid altura">
        <div>1</div>
        <div class="self-bottom">2</div>
        <div>3</div>
      </div>
    </section>
  </body>
</html>
